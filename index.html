<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Smart Garden</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="index.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">🌱</div>
    <div>
      <h1>Hệ thống tưới cây thông minh</h1>
      <p>Giám sát và điều khiển IoT</p>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">🌿 1<br><span>Tổng cây</span></div>
    <div class="stat">⚡ 1<br><span>Thiết bị hoạt động</span></div>
    <div class="stat">💧 5L<br><span>Nước hôm nay</span></div>
    <div class="stat green">📶 Online<br><span>Trạng thái</span></div>
  </div>

  <!-- PLANT -->
  <div class="plants">
    <div class="plant">

      <h2>🌵 Cây xương rồng</h2>
      <p class="type">Cactus</p>

      <!-- ĐỘ ẨM -->
      <div class="row">
        <div class="icon">💧</div>
        <div>
          <p>Độ ẩm đất</p>
          <p id="moisture-text-1" class="moisture">--%</p>
        </div>
      </div>

      <!-- NHIỆT ĐỘ + ÁNH SÁNG -->
      <div class="info">
        <div>🌡 <span id="temp-1">--°C</span></div>
        <div>☀ <span id="light-1">--%</span></div>
      </div>

      <!-- SLIDER -->
      <input type="range" id="slider-1" min="0" max="100" value="0"
             oninput="updateMoisture(1,this.value)">

      <!-- BUTTON -->
      <button onclick="waterNow(1)">💧 Tưới ngay</button>

    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom">

    <!-- CHART -->
    <div class="chart-box">
      <h2>Biểu đồ độ ẩm realtime</h2>
      <canvas id="chart"></canvas>
    </div>

    <!-- SCHEDULE -->
    <div class="schedule">
      <h2>Lịch tưới</h2>

      <div class="item">
        🌵 Cây xương rồng
        <label class="switch">
          <input type="checkbox" checked>
          <span></span>
        </label>
      </div>

    </div>

  </div>

</div>

<script src="index.js"></script>

</body>
</html>
